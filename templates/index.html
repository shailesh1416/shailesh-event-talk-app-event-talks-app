<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes & X Publisher Dashboard</title>
    <meta name="description" content="Browse Google Cloud BigQuery release notes and publish highlights to X (Twitter) instantly with customized, character-count tracked tweets.">
    <!-- Google Fonts - Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background glow gradients for deep visual aesthetic -->
    <div class="glow-bg-1"></div>
    <div class="glow-bg-2"></div>

    <div class="app-container">
        <!-- Main Layout -->
        <main class="dashboard-layout">
            <!-- Feed Section (Left/Center) -->
            <section class="feed-section">
                <header class="dashboard-header">
                    <div class="logo-area">
                        <div class="bq-logo-icon">
                            <!-- Custom BigQuery themed SVG -->
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3Z" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
                                <path d="M12 7V17M7 12H17" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
                                <circle cx="12" cy="12" r="3" fill="#3B82F6" opacity="0.8"/>
                            </svg>
                        </div>
                        <div class="logo-text">
                            <h1>BigQuery</h1>
                            <span class="subtitle">Release Notes Dashboard</span>
                        </div>
                    </div>

                    <!-- Actions Bar: Search, Filters & Sync -->
                    <div class="control-panel">
                        <div class="search-box">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <input type="text" id="search-input" placeholder="Search release notes (e.g. Gemini, external tables)..." aria-label="Search release notes">
                        </div>

                        <button id="refresh-btn" class="btn btn-secondary" title="Sync latest notes from Google Cloud feed" aria-label="Refresh notes">
                            <span class="btn-icon">
                                <svg id="sync-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.73-.73" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            <span class="btn-text">Sync Feed</span>
                        </button>
                    </div>

                    <!-- Category Pills -->
                    <div class="filter-pills" id="category-filters">
                        <button class="pill active" data-category="ALL">All Updates</button>
                        <button class="pill" data-category="Feature">Features</button>
                        <button class="pill" data-category="Fix">Fixes</button>
                        <button class="pill" data-category="Announcement">Announcements</button>
                        <button class="pill" data-category="Change">Changes</button>
                    </div>

                    <!-- Alert message container -->
                    <div id="status-toast" class="toast hidden">
                        <span class="toast-message"></span>
                        <button class="toast-close-btn">&times;</button>
                    </div>
                </header>

                <!-- Cards Grid -->
                <div class="feed-grid" id="feed-container">
                    <!-- Cards will be dynamically rendered here -->
                    
                    <!-- Loading Skeletons -->
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-badge"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-badge"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-badge"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                </div>
            </section>

            <!-- Sidebar Drawer: Tweet Composer (Right Panel) -->
            <aside class="composer-sidebar" id="composer-sidebar">
                <div class="sidebar-header">
                    <h2>X Composer</h2>
                    <span class="composer-desc">Select a release card to generate a post.</span>
                </div>

                <!-- Empty State -->
                <div class="composer-empty-state" id="composer-empty-state">
                    <div class="empty-icon">
                        <!-- Feather-like pen icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                    </div>
                    <p>Select any release note card on the left to review details and compile a post for X.</p>
                </div>

                <!-- Composer Form -->
                <div class="composer-form hidden" id="composer-form">
                    <div class="selected-details-box">
                        <div class="detail-row">
                            <span class="detail-label">Category:</span>
                            <span id="comp-category-badge" class="badge">Feature</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Date:</span>
                            <span id="comp-date-text" class="detail-value">June 17, 2026</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="tweet-textarea">Compose Draft</label>
                        <textarea id="tweet-textarea" rows="8" placeholder="Draft your tweet here..."></textarea>
                    </div>

                    <!-- Character Count Progress -->
                    <div class="char-count-row">
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="char-progress"></div>
                        </div>
                        <span id="char-count" class="char-count">0 / 280</span>
                    </div>

                    <!-- Alert message if too long -->
                    <div id="char-warning" class="composer-alert hidden">
                        <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span>Tweet text exceeds the 280 character limit.</span>
                    </div>

                    <div class="composer-actions">
                        <button id="tweet-btn" class="btn btn-primary btn-full">
                            <span class="btn-icon">
                                <!-- X logo SVG -->
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                </svg>
                            </span>
                            <span class="btn-text">Post on X (Twitter)</span>
                        </button>
                        
                        <a id="orig-doc-link" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-tertiary btn-full">
                            <span class="btn-text">View Google Docs</span>
                            <svg class="external-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Script -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
